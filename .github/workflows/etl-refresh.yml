name: Atualização do Pipeline de Dados

on:
  schedule:
    # Toda segunda-feira às 06:00 UTC (03:00 em Recife).
    # O dataset da Prefeitura atualiza mensalmente; rodar semanalmente
    # garante que nunca ficamos desatualizados por muito tempo, sem
    # gastar minutos de CI à toa.
    - cron: "0 6 * * 1"
  # Permite disparar manualmente pela aba Actions, sem esperar o cron.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Rodar pipeline e commitar dados atualizados
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: etl/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar pipeline (extract + transform + sync)
        run: python src/pipeline.py

      - name: Verificar se algo mudou
        id: git-check
        run: |
          if git diff --quiet -- ../data/processed ../frontend/public/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commitar dados atualizados
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ../data/processed ../frontend/public/data
          git commit -m "chore: atualiza dados do pipeline automaticamente [skip ci]"
          git push